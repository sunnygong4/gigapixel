<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunny's Ultra Resolution Photos</title>
  <script src="https://cdn.jsdelivr.net/npm/openseadragon@4.1/build/openseadragon/openseadragon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f14;
      --bg-elevated: #1a1a24;
      --bg-card: #15151e;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --text-faint: #71717a;
      --accent: #d4a853;
      --accent-hover: #e4b863;
      --border: #2a2a3a;
      --radius: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: linear-gradient(165deg, #0f0f18 0%, #1a1525 25%, #151822 50%, #0f1418 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle grid + glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(212, 168, 83, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 50% 30% at 50% 50%, rgba(59, 130, 246, 0.04) 0%, transparent 60%),
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 100% 100%, 64px 64px, 64px 64px;
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 15, 20, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    header.scrolled {
      border-color: var(--border);
    }

    .logo {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.375rem;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .logo a {
      color: var(--text);
      text-decoration: none;
    }

    .logo a:hover {
      color: var(--accent);
    }

    nav {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.15s;
    }

    nav a:hover {
      color: var(--accent);
    }

    nav a.active {
      color: var(--accent);
      font-weight: 600;
    }

    /* Hero */
    .hero {
      position: relative;
      z-index: 1;
      padding: 10rem 2rem 5rem;
      text-align: center;
      max-width: 680px;
      margin: 0 auto;
    }

    .hero h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(2.75rem, 6vw, 3.75rem);
      font-weight: 400;
      line-height: 1.08;
      margin-bottom: 1.25rem;
      letter-spacing: -0.035em;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1.0625rem;
      line-height: 1.75;
    }

    /* Gallery */
    .gallery {
      position: relative;
      z-index: 1;
      padding: 2rem;
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.75rem;
    }

    .gallery-item {
      position: relative;
      aspect-ratio: 16/11;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      background: var(--bg-card);
      border: 1px solid var(--border);
      transition: transform 0.2s ease, border-color 0.2s, box-shadow 0.2s;
    }

    .gallery-item:hover {
      transform: translateY(-3px);
      border-color: rgba(212, 168, 83, 0.4);
      box-shadow: 0 16px 48px -12px rgba(0, 0, 0, 0.5);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.03);
    }

    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 45%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .gallery-item:hover .overlay {
      opacity: 1;
    }

    .gallery-item .info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem 1.25rem;
      transform: translateY(6px);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .gallery-item:hover .info {
      transform: translateY(0);
      opacity: 1;
    }

    .gallery-item .info h3 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.1875rem;
      font-weight: 400;
      margin-bottom: 0.25rem;
    }

    .gallery-item .info .meta {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .gallery-item .info .dims {
      font-size: 0.75rem;
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
      margin-top: 0.125rem;
    }

    /* Viewer modal */
    .viewer-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(165deg, #0f0f18 0%, #1a1525 50%);
      z-index: 200;
      display: none;
      flex-direction: column;
    }

    .viewer-overlay.active {
      display: flex;
    }

    .viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg-elevated);
    }

    .viewer-header-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex: 1;
      min-width: 0;
    }

    .viewer-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.125rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewer-meta {
      font-size: 0.8125rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .viewer-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: inherit;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
    }

    .btn-ghost:hover {
      color: var(--accent);
    }

    .viewer-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.5rem;
      font-size: 1.5rem;
      line-height: 1;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .viewer-close:hover {
      color: var(--accent);
      background: rgba(255,255,255,0.05);
    }

    #viewer {
      flex: 1;
      min-height: 0;
    }

    .openseadragon-container {
      background: linear-gradient(165deg, #0f0f18 0%, #1a1525 50%) !important;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      padding: 5rem 2rem 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    .empty-gallery {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .empty-gallery p {
      margin-bottom: 0.5rem;
    }

    .empty-gallery code {
      background: var(--bg-elevated);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.875rem;
    }

    .gallery-section {
      grid-column: 1 / -1;
      margin-top: 2.5rem;
    }

    .gallery-section:first-of-type {
      margin-top: 0;
    }

    .gallery-section-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 1rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    /* Section cards (home view) */
    .section-cards {
      position: relative;
      z-index: 1;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    .section-card {
      display: block;
      padding: 2rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      text-align: center;
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.25rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .section-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 168, 83, 0.5);
      box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.4);
      color: var(--accent);
    }

    .section-card .count {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-weight: 500;
    }

    .view-home #gallery-container,
    .view-section #section-cards { display: none; }
    .view-section #gallery-container { display: block; }
    .view-home #section-cards { display: block; }

    @media (max-width: 640px) {
      .viewer-header { flex-wrap: wrap; }
      .viewer-meta { display: none; }
      nav { flex-wrap: wrap; gap: 0.75rem; }
      nav a { font-size: 0.8125rem; }
      .section-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body id="body" class="view-home">
  <header id="header">
    <div class="logo"><a href="#" id="logo-link">Sunny's Ultra Resolution Photos</a></div>
    <nav id="nav-sections">
      <a href="#" data-section="niagara-falls">Niagara Falls</a>
      <a href="#" data-section="british-columbia">British Columbia</a>
      <a href="#" data-section="china">China</a>
      <a href="#" data-section="enlargements">Enlargements</a>
      <a href="#" data-section="astro">Astro</a>
      <a href="#" data-section="other">Other</a>
      <a href="https://sunnygong.com" target="_blank" rel="noopener">Sunny Gong</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Sunny's Ultra Resolution Photos</h1>
      <p>Large photography to zoom and pan — explore every detail.</p>
    </section>

    <div id="section-cards" class="section-cards">
      <!-- Populated by JS -->
    </div>

    <div id="gallery-container" style="display: none;">
      <section id="gallery" class="gallery">
        <div class="empty-gallery" id="empty-state">
          <p>No photos in this section.</p>
        </div>
      </section>
    </div>
  </main>

  <footer>
    Built with <a href="https://openseadragon.github.io/" target="_blank" rel="noopener">OpenSeadragon</a> · <a href="https://sunnygong.com" target="_blank" rel="noopener">Sunny Gong</a>
  </footer>

  <div class="viewer-overlay" id="viewer-overlay">
    <div class="viewer-header">
      <div class="viewer-header-left">
        <span class="viewer-title" id="viewer-title">Photo</span>
        <span class="viewer-meta" id="viewer-meta"></span>
      </div>
      <div class="viewer-actions">
        <button class="btn btn-ghost" id="viewer-rotate" title="Rotate 90°">↻ Rotate</button>
        <a id="viewer-download" class="btn btn-primary" href="#" target="_blank" rel="noopener" style="display: none;">
          Download
        </a>
        <button class="viewer-close" id="viewer-close" aria-label="Close">×</button>
      </div>
    </div>
    <div id="viewer"></div>
  </div>

  <script src="photos.js"></script>
  <script>
    const SECTIONS = (window.PHOTO_SECTIONS || []).map((s, i) => ({
      ...s,
      slug: s.title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '')
    }));
    const PHOTOS = SECTIONS.flatMap(s => s.photos);
    const gallery = document.getElementById('gallery');
    const sectionCardsEl = document.getElementById('section-cards');
    const galleryContainer = document.getElementById('gallery-container');
    const emptyState = document.getElementById('empty-state');
    const bodyEl = document.getElementById('body');
    const logoLink = document.getElementById('logo-link');
    const navSections = document.getElementById('nav-sections');
    const viewerOverlay = document.getElementById('viewer-overlay');
    const viewerTitle = document.getElementById('viewer-title');
    const viewerMeta = document.getElementById('viewer-meta');
    const viewerDownload = document.getElementById('viewer-download');
    const viewerRotate = document.getElementById('viewer-rotate');
    const viewerClose = document.getElementById('viewer-close');
    let osdViewer = null;
    let currentSectionSlug = null;

    function formatNumber(n) {
      return n.toLocaleString();
    }

    function formatMegapixels(w, h) {
      const mp = (w * h / 1e6).toFixed(1);
      return mp + ' MP';
    }

    async function fetchDziDimensions(dziUrl) {
      try {
        const base = dziUrl.replace(/\.dzi$/, '');
        const url = base.endsWith('.dzi') ? dziUrl : base + '.dzi';
        const res = await fetch(url);
        const xml = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(xml, 'text/xml');
        const size = doc.querySelector('Size');
        if (size) {
          const w = parseInt(size.getAttribute('Width'), 10);
          const h = parseInt(size.getAttribute('Height'), 10);
          return { width: w, height: h };
        }
      } catch (e) { /* CORS or parse error */ }
      return null;
    }

    function showHome() {
      currentSectionSlug = null;
      bodyEl.className = 'view-home';
      navSections.querySelectorAll('a[data-section]').forEach(a => a.classList.remove('active'));
      history.replaceState(null, '', location.pathname + location.search);
    }

    function showSection(slug) {
      currentSectionSlug = slug;
      bodyEl.className = 'view-section';
      navSections.querySelectorAll('a[data-section]').forEach(a => {
        a.classList.toggle('active', a.dataset.section === slug);
      });
      const section = SECTIONS.find(s => s.slug === slug);
      if (!section) return;
      gallery.innerHTML = '';
      if (section.photos.length === 0) {
        emptyState.style.display = 'block';
        emptyState.querySelector('p').textContent = `No photos in ${section.title}.`;
        gallery.appendChild(emptyState);
      } else {
        emptyState.style.display = 'none';
        const sectionGrid = document.createElement('div');
        sectionGrid.className = 'gallery';
        sectionGrid.style.padding = '0';
        sectionGrid.style.maxWidth = 'none';
        section.photos.forEach((photo) => {
          const i = PHOTOS.indexOf(photo);
          const item = document.createElement('div');
          item.className = 'gallery-item';
          item.dataset.index = i;
          const dimStr = photo.width && photo.height
            ? `${formatNumber(photo.width)} × ${formatNumber(photo.height)} px`
            : '';
          item.innerHTML = `
            <img src="${photo.thumb}" alt="${photo.title}" loading="lazy">
            <div class="overlay"></div>
            <div class="info">
              <h3>${photo.title}</h3>
              <span class="meta">${photo.description || ''}</span>
              ${dimStr ? `<span class="dims">${dimStr}</span>` : ''}
            </div>
          `;
          item.addEventListener('click', () => openViewer(i));
          sectionGrid.appendChild(item);
        });
        gallery.appendChild(sectionGrid);
      }
      history.replaceState(null, '', '#' + slug);
      window.scrollTo(0, 0);
    }

    // Section cards (home)
    SECTIONS.forEach((section) => {
      const a = document.createElement('a');
      a.href = '#';
      a.className = 'section-card';
      a.dataset.section = section.slug;
      a.innerHTML = `${section.title}<span class="count">${section.photos.length} photo${section.photos.length !== 1 ? 's' : ''}</span>`;
      a.addEventListener('click', (e) => { e.preventDefault(); showSection(section.slug); });
      sectionCardsEl.appendChild(a);
    });

    logoLink.addEventListener('click', (e) => { e.preventDefault(); showHome(); });
    navSections.querySelectorAll('a[data-section]').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        showSection(a.dataset.section);
      });
    });

    window.addEventListener('hashchange', () => {
      const hash = (location.hash || '').replace(/^#/, '');
      if (hash && SECTIONS.some(s => s.slug === hash)) showSection(hash);
      else if (!hash) showHome();
    });

    const hash = (location.hash || '').replace(/^#/, '');
    if (hash && SECTIONS.some(s => s.slug === hash)) showSection(hash);

    function openViewer(index) {
      const photo = PHOTOS[index];
      viewerTitle.textContent = photo.title;
      viewerMeta.textContent = '';
      viewerDownload.style.display = 'none';
      viewerDownload.href = '#';

      if (photo.downloadUrl) {
        viewerDownload.href = photo.downloadUrl;
        viewerDownload.style.display = 'inline-flex';
      }

      viewerOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';

      osdViewer = OpenSeadragon({
        element: document.getElementById('viewer'),
        tileSources: photo.dzi,
        prefixUrl: 'https://cdn.jsdelivr.net/npm/openseadragon@4.1/build/openseadragon/images/',
        animationTime: 0.4,
        showNavigator: true,
        navigatorAutoFade: true,
        maxZoomLevel: 64,
        gestureSettingsMouse: { clickToZoom: true }
      });

      const rot = photo.rotation;
      if (rot === 90 || rot === 180 || rot === 270) {
        osdViewer.addHandler('open', function() {
          osdViewer.viewport.setRotation(rot, true);
        });
      }

      (async () => {
        const dims = photo.width && photo.height
          ? { width: photo.width, height: photo.height }
          : await fetchDziDimensions(typeof photo.dzi === 'string' ? photo.dzi : photo.dzi.url || photo.dzi);
        if (dims) {
          const str = `${formatNumber(dims.width)} × ${formatNumber(dims.height)} px · ${formatMegapixels(dims.width, dims.height)}`;
          viewerMeta.textContent = str;
        }
      })();
    }

    function closeViewer() {
      if (osdViewer) {
        osdViewer.destroy();
        osdViewer = null;
      }
      viewerOverlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    viewerRotate.addEventListener('click', () => {
      if (osdViewer) {
        const vp = osdViewer.viewport;
        vp.setRotation((vp.getRotation() + 90) % 360, false);
      }
    });
    viewerClose.addEventListener('click', closeViewer);
    viewerOverlay.addEventListener('click', (e) => {
      if (e.target === viewerOverlay) closeViewer();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeViewer();
    });

    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>
</body>
</html>
